name: Integration Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *' # Nightly at 06:00 UTC

permissions:
  contents: read

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install intu-dev runtime
        run: npm install -g intu-dev

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run integration tests
        run: gotestsum --junitfile junit-integration.xml --format testdox -- -v -race -count=1 -tags=integration -timeout=15m ./internal/integration/...

      - name: Upload JUnit XML
        uses: actions/upload-artifact@v4
        with:
          name: junit-integration
          path: junit-integration.xml
          retention-days: 30

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: /tmp/integration-*.log
          retention-days: 7
